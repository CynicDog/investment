description: Iran seized two ships in the Strait of Hormuz on April 22; Brent crude
  rose to ~$100.91/bbl and WTI to ~$91.81/bbl (Yahoo Finance, Apr 22). Headline CPI
  is running ~3.5% YoY driven by energy. Fed Gov. Waller (Apr 17) signaled no imminent
  cuts; FOMC April 29 expected to hold at 3.50-3.75% with first cut priced for September
  2026. Prolonged conflict compresses equity multiples across the entire portfolio
  via higher-for-longer rates.
monitor_for: Strait of Hormuz shipping resumption; FOMC April 29 statement tone and
  press conference; monthly CPI prints (next due mid-May); any ceasefire agreement
  between US and Iran.
