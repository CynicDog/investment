name: Weekly review

on:
  schedule:
    # Friday 21:30 UTC (~16:30 ET, post US-close)
    - cron: "30 21 * * 5"
  workflow_dispatch:

permissions:
  contents: write   # need to commit new risks/R-*.md files
  issues: write
  id-token: write
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --frozen

      - name: Refresh dashboards (read-only step — no commit here)
        run: uv run python scripts/render_dashboards.py

      - name: Compute ISO week tag
        id: week
        run: echo "tag=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Run Claude weekly review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WEEK_TAG: ${{ steps.week.outputs.tag }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the weekly portfolio review for ${{ github.repository }}.
            Read `docs/PROMPTS.md` (anchor `## weekly-review`) and follow it verbatim.
            The DSL contract is documented in `CLAUDE.md` and codified under
            `src/investment_journal/`.

            Inputs to read:
              - portfolio/allocation.yml
              - portfolio/positions/*.md
              - portfolio/dashboards/dca-flow.md
              - closed dca-tracker issues (last 4 weeks) via:
                  gh issue list --label dca-tracker --state closed --limit 6 --json number,title,body,closedAt

            For each NEW risk you surface, call:
              uv run python scripts/file_a_risk.py \
                --title "..." --severity low|medium|high \
                --surfaced-in "weekly-review/${WEEK_TAG}" \
                --ticker "TICKER_OR_OMIT" \
                --description "..." --monitor-for "..."
            It writes risks/<id>.md + opens a child issue and prints
              {"id":"R-...","issue_number":N,"path":"...","url":"..."}
            Reference those IDs in the weekly-review issue body's Risks section.

            Compose the weekly-review body following the shape in PROMPTS.md.
            Open it with:
              gh issue create --title "Weekly review ${WEEK_TAG}" --label weekly-review --body-file <file>

            Do NOT modify position dossiers, allocation.yml, or any auto-rendered
            dashboard files. Only new risks/R-*.md are allowed; the workflow
            commits those after you finish.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,Write,Bash(uv run python:*),Bash(uv run:*),Bash(date:*),Bash(cat:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh issue edit:*),WebSearch,WebFetch"

      - name: Commit new risk files if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain risks/)" ]]; then
            echo "No new risk files to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add risks/
          git commit -m "chore(risks): file new risks from weekly review (run #${{ github.run_id }})"
          git push

      - name: Refresh Risks Index issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/render_risks_index.py
