name: Update dashboards

on:
  push:
    branches: [main]
    paths:
      - "portfolio/allocation.yml"
      - "portfolio/trades.csv"
      - "portfolio/positions/**"
      - "scripts/render_dashboards.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboards
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --frozen

      - name: Render
        run: uv run python scripts/render_dashboards.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No dashboard changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio/dashboards portfolio/positions README.md
          git commit -m "chore(dashboards): regenerate from $(git rev-parse --short HEAD)"
          git pull --rebase origin main
          git push
