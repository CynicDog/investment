name: Earnings recap

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional: limit to a single earnings issue (e.g. 28). Empty = scan all open earnings issues."
        required: false
        type: string

permissions:
  contents: write   # may file risks (commit risks/R-*.md)
  issues: write
  id-token: write
  actions: read

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --frozen

      - name: Run Claude earnings recap
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the post-call earnings recap pass for ${{ github.repository }}.
            Read `docs/PROMPTS.md` (anchor `## earnings-recap`) and follow it verbatim.
            The DSL is codified under `src/investment_journal/` — schemas for
            `EarningsEvent`, `EarningsRecap`, and `Risk` define the recap shape.

            Inputs:
              - open earnings issues: gh issue list --label earnings --state open --json number,title,body
              - if env var ISSUE_NUMBER is set (manual dispatch), scope to just that issue
                and skip the date-window filter; otherwise filter to issues whose expected
                date is in the past 0–3 days.

            Idempotency: skip any issue whose existing comments already include a `### Recap`
            line (check via `gh issue view <N> --comments`). Do not post duplicate recaps.

            If the recap reveals a material thesis-impacting concern that is NOT already
            an open risk, file one:
              uv run python scripts/file_a_risk.py \
                --title "..." --severity low|medium|high \
                --surfaced-in "earnings/<TICKER>-<QQYY>" \
                --ticker "<TICKER>" \
                --description "..." --monitor-for "..."

            Be conservative: skip a ticker if you cannot confirm numbers from a primary source.
            Transcripts may lag the press release — partial recap with `_transcript pending_`
            is allowed; do not invent quotes.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,Write,Bash(uv run python:*),Bash(uv run:*),Bash(date:*),Bash(cat:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh api *),WebSearch,WebFetch"

      - name: Commit new risk files if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain risks/)" ]]; then
            echo "No new risk files to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add risks/
          git commit -m "chore(risks): file new risks from earnings recap (run #${{ github.run_id }})"
          git pull --rebase origin main
          git push

      - name: Refresh Risks Index issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/render_risks_index.py
