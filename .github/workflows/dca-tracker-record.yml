name: DCA tracker — record fills

# Triggers when the user ticks a checkbox on a `dca-tracker` issue (or
# otherwise edits its body). The script captures Y/N per (date, ticker),
# fetches Alpha Vantage closing prices for newly confirmed days + latest
# marks for cumulative P&L, and refreshes both `portfolio/dca_history.json`
# and `portfolio/dashboards/dca-pnl.md`. The compact P&L block on the
# tracker issue body is also re-rendered.

on:
  issues:
    types: [edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "DCA tracker issue number to (re)process"
        required: true
        type: number

permissions:
  contents: write
  issues: write

concurrency:
  group: dca-tracker-record-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  record:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.issue.labels.*.name, 'dca-tracker') &&
       !contains(github.event.sender.login, '[bot]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --frozen

      - name: Record fills + recompute P&L
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: uv run python scripts/record_dca_fills.py --issue "$ISSUE_NUMBER"

      - name: Commit + push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain portfolio/dca_history.json portfolio/dashboards/dca-pnl.md)" ]]; then
            echo "No history or dashboard changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add portfolio/dca_history.json portfolio/dashboards/dca-pnl.md
          git commit -m "chore(dca): record fills + refresh P&L (issue #${{ github.event.issue.number || inputs.issue_number }}, run #${{ github.run_id }})"
          git pull --rebase origin main
          git push
