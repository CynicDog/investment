name: Append trade

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  append:
    if: contains(toJSON(github.event.issue.labels.*.name), 'trade-log')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Write issue body to file
        env:
          BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$BODY" > /tmp/issue_body.md

      - name: Append trade row
        id: append
        run: |
          set -e
          python scripts/append_trade.py --body-file /tmp/issue_body.md > /tmp/summary.md

      - name: Commit trades.csv
        run: |
          if git diff --quiet portfolio/trades.csv; then
            echo "No CSV change — parse may have failed."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio/trades.csv
          git commit -m "chore(trades): append from #${{ github.event.issue.number }}"
          git push

      - name: Comment on issue and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file /tmp/summary.md
          gh issue close   ${{ github.event.issue.number }} --reason completed

      - name: Comment on parse failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body \
            "Trade parse failed. See workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
