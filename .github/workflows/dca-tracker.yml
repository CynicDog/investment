name: DCA tracker

# Rotates a weekly issue with five Mon-Fri checkboxes.
# Runs Sunday 22:00 UTC (~Monday 07:00 KST). On each run:
#   1. Closes any still-open dca-tracker issue from prior weeks (with a tally comment).
#   2. Opens a fresh weekly tracker issue for the upcoming Mon-Fri.
#
# Tick a box each weekday once Toss confirms the DCA fill in the app.
# Closed issues become the journal — the weekly review reads them to tally fills.

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Compute upcoming Mon-Fri dates
        id: dates
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import date, timedelta
          today = date.today()  # runner is UTC; cron fires Sunday 22 UTC
          days_until_mon = (0 - today.weekday()) % 7 or 7
          mon = today + timedelta(days=days_until_mon)
          for i, name in enumerate(["mon", "tue", "wed", "thu", "fri"]):
              print(f"{name}={mon + timedelta(days=i)}")
          PY

      - name: Close prior open dca-tracker issues with tally
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          for n in $(gh issue list -R "$REPO" --label dca-tracker --state open --json number -q '.[].number'); do
            body=$(gh issue view "$n" -R "$REPO" --json body -q .body)
            ticked=$(printf '%s\n' "$body" | grep -c '^- \[x\]' || true)
            total=$(printf  '%s\n' "$body" | grep -c '^- \[' || true)
            gh issue comment "$n" -R "$REPO" --body "Auto-closing at end of week. Tally: ${ticked}/${total} confirmed."
            gh issue close "$n" -R "$REPO" --reason completed
          done

      - name: Open this week's tracker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MON: ${{ steps.dates.outputs.mon }}
          TUE: ${{ steps.dates.outputs.tue }}
          WED: ${{ steps.dates.outputs.wed }}
          THU: ${{ steps.dates.outputs.thu }}
          FRI: ${{ steps.dates.outputs.fri }}
        run: |
          body=$(cat <<EOF
          DCA confirmation tracker for the week of **$MON**.

          Tick each day after Toss confirms the daily DCA fill. If a day is missed
          (Toss outage, market holiday, manual skip), leave it unchecked — the
          weekly review tallies what was confirmed, not what should have been.

          - [ ] Mon $MON — DCA executed at Toss
          - [ ] Tue $TUE — DCA executed at Toss
          - [ ] Wed $WED — DCA executed at Toss
          - [ ] Thu $THU — DCA executed at Toss
          - [ ] Fri $FRI — DCA executed at Toss

          ---

          Daily target split (per \`portfolio/allocation.yml\`):

          | Ticker | Daily \$ |
          |---|---|
          | VOO | \$29 |
          | HLNE | \$15 |
          | HALO | \$15 |
          | ETN | \$14 |
          | MKL | \$11 |
          | IDCC | \$8 |
          | P | \$8 |

          _Personal journal. Not financial advice._
          EOF
          )
          gh issue create -R "$REPO" \
            --title "DCA tracker: week of $MON" \
            --label dca-tracker \
            --body "$body"
