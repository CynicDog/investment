name: Earnings watcher

on:
  schedule:
    # Daily 13:00 UTC, before US open
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run Claude earnings watcher
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running the daily earnings watcher for ${{ github.repository }}.
            Read the prompt definition under `## earnings-watcher` in `docs/PROMPTS.md` and follow it
            verbatim. Inputs:
              - portfolio/allocation.yml (list of tickers)
              - existing open earnings issues (gh issue list --label earnings --state open)
            For each ticker:
              1. Web-search the next confirmed earnings date (prefer the company's IR site or NASDAQ).
              2. If date is within 7 days AND no open issue with title matching "Earnings: {TICKER} {Q}Q{YY}" exists,
                 open one using the earnings-event template structure (label: earnings, auto-tick).
              3. If an earnings date passed in the last 3 days and the issue body lacks the "### Recap" header,
                 web-search the press release + transcript and post a recap comment with reported numbers,
                 guidance change, and 1-3 quote-worthy lines. Then edit the issue body to tick:
                 [x] Earnings released, [x] Recap published.
            Be conservative: if you cannot confirm an earnings date from a primary source, skip that ticker.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,Bash(gh issue *),Bash(gh api *),Bash(date:*),Bash(cat:*),WebSearch,WebFetch"
