name: Earnings watcher

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write   # may file risks (commit risks/R-*.md)
  issues: write
  id-token: write
  actions: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --frozen

      - name: Run Claude earnings watcher
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the daily pre-call earnings watcher for ${{ github.repository }}.
            Read `docs/PROMPTS.md` (anchor `## earnings-watcher`) and follow it verbatim.
            Post-call recaps are owned by a separate workflow (`earnings-recap.yml`); do not
            author recap comments here.
            The DSL is codified under `src/investment_journal/` — schemas for
            `EarningsEvent` and `Risk` define the issue + risk shapes.

            Inputs:
              - portfolio/allocation.yml (list of tickers)
              - open earnings issues: gh issue list --label earnings --state open

            If pre-call prep surfaces a material thesis-impacting concern, file a risk:
              uv run python scripts/file_a_risk.py \
                --title "..." --severity low|medium|high \
                --surfaced-in "earnings/<TICKER>-<QQYY>" \
                --ticker "<TICKER>" \
                --description "..." --monitor-for "..."

            Be conservative: skip a ticker if you cannot confirm dates from a primary source.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,Write,Bash(uv run python:*),Bash(uv run:*),Bash(date:*),Bash(cat:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh api *),WebSearch,WebFetch"

      - name: Commit new risk files if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain risks/)" ]]; then
            echo "No new risk files to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add risks/
          git commit -m "chore(risks): file new risks from earnings watcher (run #${{ github.run_id }})"
          git pull --rebase origin main
          git push

      - name: Refresh upcoming-earnings dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/render_upcoming_earnings.py

      - name: Commit dashboard if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet portfolio/dashboards/upcoming-earnings.md; then
            echo "Dashboard unchanged."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add portfolio/dashboards/upcoming-earnings.md
          git commit -m "chore(dashboards): refresh upcoming-earnings (run #${{ github.run_id }})"
          git pull --rebase origin main
          git push

      - name: Refresh Risks Index issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/render_risks_index.py
