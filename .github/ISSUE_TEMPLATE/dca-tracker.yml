name: DCA tracker (weekly, manual)
description: Manually open a DCA tracker for a specific week. Normally auto-opened by .github/workflows/dca-tracker.yml every Sunday 22 UTC.
title: "DCA tracker: week of YYYY-MM-DD"
labels: ["dca-tracker"]
body:
  - type: input
    id: monday
    attributes:
      label: Monday of the week (YYYY-MM-DD)
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Daily checkboxes
      value: |
        - [ ] Mon YYYY-MM-DD — DCA executed at Toss
        - [ ] Tue YYYY-MM-DD — DCA executed at Toss
        - [ ] Wed YYYY-MM-DD — DCA executed at Toss
        - [ ] Thu YYYY-MM-DD — DCA executed at Toss
        - [ ] Fri YYYY-MM-DD — DCA executed at Toss
