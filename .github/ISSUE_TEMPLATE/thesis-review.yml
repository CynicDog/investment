name: Monthly thesis review
description: Monthly re-check of a position's thesis. Does it still hold?
title: "Thesis review: {TICKER} {YYYY-MM}"
labels: ["thesis-review"]
body:
  - type: input
    id: ticker
    attributes:
      label: Ticker
    validations:
      required: true

  - type: input
    id: month
    attributes:
      label: Month being reviewed
      placeholder: "2026-04"
    validations:
      required: true

  - type: textarea
    id: still-holds
    attributes:
      label: Does the thesis still hold?
      description: Yes / partially / no — and the one-sentence why.
    validations:
      required: true

  - type: textarea
    id: bull-changes
    attributes:
      label: What changed in the bull case?
    validations:
      required: false

  - type: textarea
    id: bear-changes
    attributes:
      label: What changed in the bear case / risks?
    validations:
      required: false

  - type: textarea
    id: action
    attributes:
      label: Action taken or planned
      placeholder: e.g. trim target weight by 2pp; raise by 2pp; no change
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Position file thesis section updated
        - [ ] `allocation.yml` updated (if weights changed)
