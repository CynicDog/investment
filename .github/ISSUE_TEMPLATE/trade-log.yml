name: Trade log
description: Record a fill, dividend, or sale. The workflow appends a row to portfolio/trades.csv and closes this issue.
title: "Trade: {TICKER} {YYYY-MM-DD}"
labels: ["trade-log"]
body:
  - type: markdown
    attributes:
      value: |
        Submitting this issue triggers `.github/workflows/append-trade.yml` (part of `update-dashboards.yml` flow):
        - Parses the fields below.
        - Appends a row to `portfolio/trades.csv`.
        - Re-renders dashboards.
        - Closes this issue with a confirmation comment.

  - type: input
    id: ticker
    attributes:
      label: Ticker
      placeholder: VOO
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: YYYY-MM-DD. Leave blank for today.
      placeholder: "2026-04-26"
    validations:
      required: false

  - type: dropdown
    id: action
    attributes:
      label: Action
      options:
        - BUY
        - SELL
        - DIV
    validations:
      required: true

  - type: input
    id: shares
    attributes:
      label: Shares
      description: Fractional shares allowed. For DIV use 0 if cash dividend, or the reinvested share count.
      placeholder: "0.0432"
    validations:
      required: true

  - type: input
    id: price
    attributes:
      label: Price
      description: Fill price per share in USD. For cash DIV, enter the dividend amount per share.
      placeholder: "810.50"
    validations:
      required: true

  - type: input
    id: fee
    attributes:
      label: Fee
      description: Commission / fee in USD. Use 0 for fee-free brokers.
      placeholder: "0"
    validations:
      required: true

  - type: input
    id: notes
    attributes:
      label: Notes
      placeholder: "DCA"
    validations:
      required: false
